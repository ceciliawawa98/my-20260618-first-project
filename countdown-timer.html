<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>倒數計時器</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
  }
  .timer-card {
    background: #16213e;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    width: 320px;
  }
  h1 {
    color: #eaeaea;
    font-size: 22px;
    margin: 0 0 1.5rem;
  }
  .inputs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .inputs input {
    width: 60px;
    padding: 8px;
    font-size: 18px;
    text-align: center;
    border-radius: 8px;
    border: none;
    outline: none;
  }
  .display {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 3px;
    color: #4cd3c2;
    margin-bottom: 1.5rem;
    font-family: monospace;
  }
  .display.danger {
    color: #ff5b5b;
  }
  .progress {
    width: 100%;
    height: 10px;
    background: #0f3460;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .progress-fill {
    height: 100%;
    width: 100%;
    background: #4cd3c2;
    transition: width 1s linear, background 0.3s;
  }
  .progress-fill.danger {
    background: #ff5b5b;
  }
  .buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    color: #fff;
  }
  #startBtn { background: #4cd3c2; }
  #resetBtn { background: #555; }
  .status {
    margin-top: 1rem;
    color: #aaa;
    font-size: 14px;
    min-height: 18px;
  }
</style>
</head>
<body>

<div class="timer-card">
  <h1>⏱ 倒數計時器</h1>

  <div class="inputs">
    <input type="number" id="minInput" min="0" value="1" placeholder="分">
    <input type="number" id="secInput" min="0" max="59" value="0" placeholder="秒">
  </div>

  <div class="display" id="display">01:00</div>

  <div class="progress">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="buttons">
    <button id="startBtn" onclick="startStop()">開始</button>
    <button id="resetBtn" onclick="resetTimer()">重設</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  let interval = null;
  let running = false;
  let remaining = 60;
  let total = 60;

  function getInput() {
    const min = parseInt(document.getElementById('minInput').value) || 0;
    const sec = parseInt(document.getElementById('secInput').value) || 0;
    return min * 60 + sec;
  }

  function pad(n) {
    return n.toString().padStart(2, '0');
  }

  function updateDisplay(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    document.getElementById('display').textContent = pad(m) + ':' + pad(s);
    document.getElementById('display').className = 'display' + (sec <= 10 && sec > 0 ? ' danger' : '');
    const fill = document.getElementById('progressFill');
    const pct = total > 0 ? (sec / total) * 100 : 100;
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (sec <= 10 && sec > 0 ? ' danger' : '');
  }

  function startStop() {
    const btn = document.getElementById('startBtn');
    if (running) {
      clearInterval(interval);
      running = false;
      btn.textContent = '繼續';
      document.getElementById('status').textContent = '已暫停';
      return;
    }
    if (remaining === 0) {
      total = getInput();
      if (total === 0) {
        document.getElementById('status').textContent = '請輸入時間';
        return;
      }
      remaining = total;
    }
    running = true;
    btn.textContent = '暫停';
    document.getElementById('status').textContent = '計時中…';
    interval = setInterval(() => {
      remaining--;
      updateDisplay(remaining);
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        document.getElementById('startBtn').textContent = '開始';
        document.getElementById('status').textContent = '⏰ 時間到！';
      }
    }, 1000);
  }

  function resetTimer() {
    clearInterval(interval);
    running = false;
    remaining = 0;
    total = getInput();
    document.getElementById('startBtn').textContent = '開始';
    document.getElementById('status').textContent = '';
    updateDisplay(total);
  }

  resetTimer();
</script>

</body>
</html>
